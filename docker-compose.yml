services:
  web:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-password}
      ADMIN_SLUG: ${ADMIN_SLUG:-owner-console}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-secret}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      DATA_DIR: /data
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-App Support Hub}
    volumes:
      - app_data:/data
    restart: unless-stopped

volumes:
  app_data:
